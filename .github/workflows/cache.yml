name: "Cache"
on:
  push:
    branches: [main]
jobs:
  cache-build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v17
        with:
          name: futarimiti
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - run: 'nix build .#'
